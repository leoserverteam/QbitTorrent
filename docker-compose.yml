version: "3.8"
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - WEBUI_PORT=8080
    volumes:
      - ./config:/config
      - /path/to/downloads:/downloads
    ports:
      - 127.0.0.1:8080:8080 
    restart: unless-stopped
