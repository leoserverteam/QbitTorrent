server {
    listen 80;
    server_name qbit.leonet.site;
    include snippets/force-https.conf;
}

server {
    listen 443 ssl http2;
    server_name qbit.leonet.site;

    include snippets/authentikoutpost.conf;

    location / {
        include snippets/authentikcheck.conf;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Referer $http_referer;
        proxy_set_header Origin $http_origin;
    }

    include snippets/authentikunauthorized.conf;
    
    include snippets/sslpath.conf;
}

